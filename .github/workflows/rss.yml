name: Update RSS Feed

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

- uses: actions/setup-node@v3
  with:
    node-version: 20

- run: npm install

      - run: node generate.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if git diff --quiet feed.json; then
            echo "Aucun changement détecté"
            exit 0
          fi

          git add feed.json
          git commit -m "Mise à jour automatique du flux"
          git push
